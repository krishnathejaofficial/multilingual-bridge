name: multilingual_bridge
description: Empathetic voice-first multilingual communication app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ─── HTTP & API ─────────────────────────────────────────────────────────────
  http: ^1.2.1
  dio: ^5.4.3+1
  web_socket_channel: ^2.4.4

  # ─── Audio Recording & Playback ──────────────────────────────────────────────
  record: ^5.1.0
  audioplayers: ^6.0.0
  just_audio: ^0.9.36

  # ─── State Management ────────────────────────────────────────────────────────
  provider: ^6.1.2
  flutter_bloc: ^8.1.5

  # ─── Storage ─────────────────────────────────────────────────────────────────
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

  # ─── UI & UX ─────────────────────────────────────────────────────────────────
  flutter_vibrate: ^1.3.0
  image_picker: ^1.1.1
  permission_handler: ^11.3.1

  # ─── Clipboard ───────────────────────────────────────────────────────────────
  # Built-in: Clipboard (dart:ui)

  # ─── Utilities ───────────────────────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/audio/
    - assets/images/
  
  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
        - asset: assets/fonts/NotoSans-Bold.ttf
          weight: 700
