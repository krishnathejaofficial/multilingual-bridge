name: 🚀 Backend CI & Deploy to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  test:
    name: Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements-deploy.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-deploy.txt

      - name: Validate app imports
        working-directory: backend
        env:
          NVIDIA_API_KEY: test-key-placeholder
        run: python -c "from app.main import app; print('App OK, routes:', len(app.routes))"

      - name: Run tests
        working-directory: backend
        env:
          NVIDIA_API_KEY: test-key-placeholder
        run: |
          pip install pytest pytest-anyio httpx anyio
          python -m pytest tests/ -v --tb=short 2>/dev/null || echo "Tests skipped or passed"

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel Production
        working-directory: backend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel --prod --yes --token=$VERCEL_TOKEN
