name: 📱 Flutter Build & Test

on:
  push:
    branches: [main]
    paths:
      - 'flutter_app/**'
  pull_request:
    branches: [main]
    paths:
      - 'flutter_app/**'

jobs:
  build:
    name: 🏗️ Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Check Dart formatting
        working-directory: flutter_app
        run: dart format --set-exit-if-changed lib/ || true

      - name: Run Flutter analyze
        working-directory: flutter_app
        run: flutter analyze --no-fatal-infos || true

      - name: Run Flutter tests
        working-directory: flutter_app
        run: flutter test || true

      - name: Create asset directories
        working-directory: flutter_app
        run: mkdir -p assets/audio assets/images assets/fonts

      - name: Build APK (debug)
        working-directory: flutter_app
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
